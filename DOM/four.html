<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky</title>
</head>
<body style = "background-color: #212121; color: #fff;">
    <ul class="language">
        <li>javascript</li>
    </ul>
</body>
<script>
    function addLanguage(langname){
        const li = document.createElement('li')
        li.innerHTML= `${langname}`
        document.querySelector(".language").appendChild(li); // it is traversing everytime to add the element which is not optimised inner html traverse everytime to do that
    }
    // addLanguage("python")
    // addLanguage("java")
    

    // this is a more optimised approach since it does not travel everytime to add node
    function addOptLanguage(langname){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langname))
        document.querySelector('.language').appendChild(li)
    }

    addOptLanguage('golang')

    //⁡⁢⁢⁢​‌‍‌edit​⁡
    //now when we have edited this how we are going to edit it
    const secondLang = document.querySelector('li:nth-child(2)')
    // we used nth child 2 to edit second element
    // secondLang.innerHTML = "mojo" it is good but dont much used because of optimisation problem
    const newli =  document.createElement('li')
    newli.textContent = "mojo"
    secondLang.replaceWith(newli)
    // replace with is used to replace the element you selected vs the element you created

    //⁡⁢⁣⁢​‌‍‌one more edit example​⁡
    const li = document.createElement('li')
    const firstLang = document.querySelector('li:nth-child(1)')
    li.textContent = 'python'
    firstLang.replaceWith(li)


// this is used to change the whole html thats why it is known as outerHTMl

// firstLang.outerHTML = '<li>Typescript</li>'


//how to remove element
const lastLang = document.querySelector('li:last-child')
lastlang.remove()
</script>
</html>
